name: Sync Firebase Sales Data

"on":
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Firebase data
        run: |
          curl -s "https://ventum-sales-default-rtdb.firebaseio.com/sales.json" > sales.json
          echo "Fetched $(wc -c < sales.json) bytes"

      - name: Commit and push if changed
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add sales.json
          git diff --staged --quiet || git commit -m "Auto-sync sales data $(date -u +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

